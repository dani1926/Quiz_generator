        .letter { color: #9aa0a6; font-weight: bold; min-width: 25px; }
        .footer { margin-top: 30px; display: flex; justify-content: flex-end; }
        .btn { background: var(--accent); color: #041e49; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #3c4043; color: #80868b; }
        .hidden { display: none !important; }
        .res-card { text-align: center; background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); }
        .rev-item { padding: 20px 0; border-bottom: 1px solid #333; }
        .rev-ans { margin-top: 8px; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.03); font-size: 0.95rem;}

</head>

// Creazione del database in formato Object
const db = rawData.map(line => {
    let parts = line.split('|');
    return { q: parts[0].trim(), c: parts[1].trim() };
});

// Array di tutte le risposte corrette esistenti per generare i distrattori
const allCorrectAnswers = db.map(item => item.c);

// Generatore del test quotidiano
function getDailyQuiz() {
    // 1. Estrae 30 domande a caso dall'intero paniere
    let selectedQuestions = [...db].sort(() => 0.5 - Math.random()).slice(0, 30);
    
    // 2. Genera i distrattori per ogni domanda in base alla lunghezza del testo
    return selectedQuestions.map(item => {
        let correctAns = item.c;
        
        // Filtra le risposte che hanno una lunghezza simile (+/- 35 caratteri) per evitare il trucco visivo
        let similarLengthAnswers = allCorrectAnswers.filter(a => 
            a !== correctAns && Math.abs(a.length - correctAns.length) < 35
        );
        
        // Se non trova abbastanza risposte simili, usa tutte le risposte disponibili (fallback)
        if (similarLengthAnswers.length < 3) {
            similarLengthAnswers = allCorrectAnswers.filter(a => a !== correctAns);
        }
        
        // Sceglie 3 distrattori casuali
        let distractors = similarLengthAnswers.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        // Unisce la risposta giusta ai 3 distrattori e rimescola le opzioni (A, B, C, D)
        let options = [correctAns, ...distractors].sort(() => 0.5 - Math.random());
        
        return {
            q: item.q,
            a: options,
            correctIdx: options.indexOf(correctAns),
            correctText: correctAns
        };
    });
}

let activeQuiz = getDailyQuiz();
let currentIdx = 0;
let correctHits = 0;
let wrongHits = 0;
let answersLog = [];

function render() {
    const data = activeQuiz[currentIdx];
    document.getElementById('pos').innerText = (currentIdx + 1) + " / 30";
    document.getElementById('bar-fill').style.width = (currentIdx / 30 * 100) + "%";
    document.getElementById('q-txt').innerText = data.q;
    
    const list = document.getElementById('opt-list');
    list.innerHTML = '';
    data.a.forEach((txt, i) => {
        const d = document.createElement('div');
        d.className = 'opt';
        d.innerHTML = `<span class="letter">${String.fromCharCode(65+i)}</span><span>${txt}</span>`;
        d.onclick = () => {
            document.querySelectorAll('.opt').forEach(x => x.classList.remove('active'));
            d.classList.add('active');
            answersLog[currentIdx] = i;
            document.getElementById('next-btn').disabled = false;
        };
        list.appendChild(d);
    });
}

document.getElementById('next-btn').onclick = () => {
    if(answersLog[currentIdx] === activeQuiz[currentIdx].correctIdx) correctHits++; else wrongHits++;
    document.getElementById('r-val').innerText = correctHits;
    document.getElementById('w-val').innerText = wrongHits;
    currentIdx++;
    if(currentIdx < 30) { render(); document.getElementById('next-btn').disabled = true; }
    else finish();
};

function finish() {
    document.getElementById('quiz-ui').classList.add('hidden');
    document.getElementById('res-ui').classList.remove('hidden');
    document.getElementById('bar-fill').style.width = "100%";
    document.getElementById('f-score').innerText = correctHits + " / 30";
    document.getElementById('f-msg').innerText = correctHits >= 25 ? "Superato brillantemente! La logica anti-trucco non ti ha fregato." : "Attenzione: non basta più cercare la risposta lunga, bisogna studiare i concetti!";
}

document.getElementById('rev-btn').onclick = () => {
    const ui = document.getElementById('rev-ui');
    ui.classList.toggle('hidden');
    ui.innerHTML = '<h3>Dettaglio Risposte</h3>';
    activeQuiz.forEach((q, i) => {
        const ok = q.correctIdx === answersLog[i];
        const d = document.createElement('div');
        d.className = 'rev-item';
        
        let ansHtml = `<strong>${i+1}. ${q.q}</strong>`;
        ansHtml += `<div class="rev-ans" style="border-left: 4px solid ${ok ? 'var(--correct)':'var(--wrong)'}">`;
        ansHtml += `<div style="color:${ok ? 'var(--correct)':'var(--wrong)'}; margin-bottom:5px;">Scelta: ${q.a[answersLog[i]]}</div>`;
        if(!ok) {
            ansHtml += `<div style="color:var(--correct)">Corretta: ${q.correctText}</div>`;
        }
        ansHtml += `</div>`;
        
        d.innerHTML = ansHtml;
        ui.appendChild(d);
    });
};

render();
