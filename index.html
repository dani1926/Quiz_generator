<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Esame Didattica - Versione Finale</title>
    <style>
        :root {
            --bg: #131314; --card: #1e1f20; --txt: #e3e3e3; 
            --accent: #a8c7fa; --correct: #81c995; --wrong: #f28b82; --border: #444746;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); display: flex; justify-content: center; margin: 0; padding: 15px; }
        #container { width: 100%; max-width: 650px; }
        .header { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .bar-bg { background: #333; height: 8px; border-radius: 4px; margin-bottom: 15px; }
        #bar-fill { height: 100%; background: #4447e5; width: 0%; border-radius: 4px; transition: 0.4s; }
        .stats { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .badge { padding: 5px 15px; border-radius: 15px; font-weight: bold; border: 1px solid transparent; }
        .b-wrong { background: rgba(234,67,53,0.1); color: var(--wrong); border-color: rgba(234,67,53,0.3); }
        .b-right { background: rgba(52,168,83,0.1); color: var(--correct); border-color: rgba(52,168,83,0.3); }
        .q-text { font-size: 1.15rem; font-weight: 500; line-height: 1.4; margin-bottom: 25px; }
        .opt-list { display: flex; flex-direction: column; gap: 12px; }
        .opt { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: 0.2s; display: flex; gap: 12px; }
        .opt:hover { background: #2d2f31; }
        .opt.active { border-color: var(--accent); background: rgba(168,199,250,0.05); }
        .letter { color: #9aa0a6; font-weight: bold; min-width: 25px; }
        .footer { margin-top: 30px; display: flex; justify-content: flex-end; }
        .btn { background: var(--accent); color: #041e49; border: none; padding: 12px 35px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #3c4043; color: #80868b; }
        .hidden { display: none !important; }
        .res-card { text-align: center; background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--border); }
        .rev-item { padding: 20px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div id="container">
    <div id="quiz-ui">
        <div class="header">
            <div class="bar-bg"><div id="bar-fill"></div></div>
            <div class="stats">
                <span id="pos" style="color: #9aa0a6">1 / 30</span>
                <div style="display:flex; gap:10px">
                    <div class="badge b-wrong">✕ <span id="w-val">0</span></div>
                    <div class="badge b-right">✓ <span id="r-val">0</span></div>
                </div>
            </div>
        </div>
        <div class="q-box">
            <div class="q-text" id="q-txt">Inizializzazione...</div>
            <div class="opt-list" id="opt-list"></div>
        </div>
        <div class="footer"><button id="next-btn" class="btn" disabled>Avanti</button></div>
    </div>

    <div id="res-ui" class="hidden">
        <div class="res-card">
            <h2>Analisi Performance</h2>
            <div style="font-size: 3.5rem; font-weight: 800; color: var(--accent); margin: 15px 0;" id="f-score">0/30</div>
            <p id="f-msg"></p>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:25px;">
                <button class="btn" onclick="location.reload()">Inizia Nuova Sessione</button>
                <button id="rev-btn" style="background:none; color:var(--accent); border:1px solid var(--accent); padding:10px; border-radius:20px; cursor:pointer;">Esamina Risposte</button>
            </div>
        </div>
        <div id="rev-ui" class="hidden" style="margin-top:40px;"><h3>Dettaglio Risposte</h3></div>
    </div>
</div>

<script>
// Database potenziato: Distrattori bilanciati e linguaggi accademici simili
const masterPool = [
    {
        q: "Qual è la definizione corretta di costruttivismo in ambito didattico?",
        a: [
            "Una teoria della conoscenza secondo la quale il sapere è il prodotto delle azioni di un soggetto attivo in funzione adattativa con la realtà.",
            "Un paradigma psicologico che intende la conoscenza come il risultato di una pura ripetizione mnemonica di contenuti predefiniti.",
            "Un approccio pedagogico che considera l'ambiente di apprendimento come uno spazio d'azione non strutturato gestito dall'alunno.",
            "Una metodologia d'insegnamento centrata sulla trasmissione verticale del sapere dal docente a un alunno considerato passivo."
        ],
        c: 0
    },
    {
        q: "Secondo le teorie di D. Schön, un professionista che adotta una 'razionalità tecnica' è:",
        a: [
            "Un operatore capace di sviluppare nuove ipotesi interpretative in situazioni di pratica uniche, incerte e spesso conflittuali.",
            "Un soggetto che riflette nel mezzo dell'azione senza interromperla, integrando costantemente teoria e prassi professionale.",
            "Solamente un esecutore di procedure standard frutto dell'applicazione rigorosa di teorie e tecniche collaudate in precedenza.",
            "Un educatore che dedica tempo adeguato a pensare a ritroso dopo l'azione per sedimentare i guadagni formativi ottenuti."
        ],
        c: 2
    },
    {
        q: "Nella progettazione educativa, l'approccio concertativo/partecipativo si basa principalmente sulla tappa di:",
        a: [
            "Ideazione, intesa come la definizione tecnica e unilaterale del problema da parte del progettista esperto.",
            "Attivazione, finalizzata alla ricerca di risorse e alla costruzione di un sistema di relazioni tra gli attori coinvolti.",
            "Valutazione, orientata esclusivamente alla misurazione quantitativa degli esiti finali rispetto agli obiettivi prefissati.",
            "Condivisione, intesa come l'accettazione passiva da parte dei beneficiari di un progetto già strutturato integralmente."
        ],
        c: 1
    },
    {
        q: "Cosa si intende per 'scaffolding' nella prospettiva della zona di sviluppo prossimale?",
        a: [
            "L'impalcatura di sostegno fornita dall'adulto per permettere all'alunno di operare in uno spazio tra capacità attuale e potenziale.",
            "Il processo di valutazione sommativa volto a certificare il raggiungimento di competenze già consolidate in modo autonomo.",
            "La tecnica di insegnamento frontale che mira a trasmettere concetti astratti attraverso la ripetizione costante di esempi pratici.",
            "L'organizzazione logica e gerarchica delle conoscenze all'interno di un curricolo sinottico privo di flessibilità operativa."
        ],
        c: 0
    },
    {
        q: "La 'competenza riflessiva', secondo lo scenario del lifelong learning contemporaneo, è considerata:",
        a: [
            "Un atto cognitivo isolato finalizzato esclusivamente alla risoluzione di problemi tecnici di natura scolastica.",
            "Una competenza trasversale che taglia le Life Skills riconosciute dall'OMS e supporta la rettificazione delle idee.",
            "L'abilità di memorizzare e riprodurre fedelmente schemi comportamentali appresi durante la formazione primaria.",
            "Una dote innata del docente che non può essere potenziata attraverso la formazione continua o la ricerca empirica."
        ],
        c: 1
    },
    {
        q: "L'inclusione scolastica, nella prospettiva della migliore qualità della vita, si realizza attraverso:",
        a: [
            "Strategie finalizzate allo sviluppo delle potenzialità nel rispetto dell'autodeterminazione e dell'accomodamento ragionevole.",
            "L'inserimento fisico dell'alunno con disabilità in classi comuni senza la necessità di modificare i materiali didattici standard.",
            "Una programmazione differenziata che esclude il confronto tra l'alunno con bisogni speciali e il resto del gruppo classe.",
            "La delega esclusiva dei processi di apprendimento all'insegnante di sostegno per garantire una gestione separata dei BES."
        ],
        c: 0
    },
    {
        q: "Cosa differenzia l'esperienza come 'Erlebnis' dall'esperienza come 'Erfahrung'?",
        a: [
            "L'Erlebnis è l'esperienza vissuta e cumulata negli anni, mentre l'Erfahrung è l'emozione legata al solo stimolo del presente.",
            "L'Erfahrung indica un tipo di conoscenza teorica, mentre l'Erlebnis riguarda esclusivamente la sperimentazione attiva sul campo.",
            "L'Erfahrung è l'esperienza vissuta cumulata nel tempo, l'Erlebnis è un tipo di esperienza che si consuma sugli stimoli del presente.",
            "Non vi è alcuna differenza, poiché entrambi i termini tedeschi indicano il coinvolgimento diretto in un evento o fenomeno."
        ],
        c: 2
    },
    {
        q: "Nella didattica laboratoriale, l'insegnante assume principalmente il ruolo di:",
        a: [
            "Unico trasmettitore di saperi accademici attraverso una lezione frontale centrata sull'esposizione di concetti e teorie.",
            "Progettista dell'apprendimento che facilita la competenza attraverso la pratica, la riflessione e l'interiorizzazione.",
            "Osservatore passivo che non interviene mai durante le attività per non interferire con la spontaneità degli allievi.",
            "Valutatore sommativo che interviene solo al termine del processo per sanzionare gli errori commessi dagli studenti."
        ],
        c: 1
    },
    {
        q: "L'Universal Design for Learning (UDL) propone di progettare i curricula offrendo:",
        a: [
            "Un unico mezzo di rappresentazione e azione per garantire l'uguaglianza formale tra tutti gli studenti della classe.",
            "Molteplici mezzi di rappresentazione, azione, espressione e coinvolgimento per rispondere alle diverse esigenze degli studenti.",
            "Prove di verifica semplificate solo per gli alunni con disabilità certificata, mantenendo standard elevati per gli altri.",
            "Contenuti digitali identici per tutti i discenti, indipendentemente dalle loro caratteristiche sensoriali o cognitive."
        ],
        c: 1
    },
    {
        q: "Secondo Gardner, l'intelligenza dovrebbe essere vista come:",
        a: [
            "Una singola entità statica misurabile attraverso test standardizzati volti a definire il quoziente intellettivo (QI).",
            "Un insieme pluralistico di facoltà mentali (almeno 7 o 9) che si manifestano in ambiti e contesti culturali differenti.",
            "La capacità di adattarsi passivamente all'ambiente circostante senza la necessità di utilizzare linguaggi simbolici.",
            "Un processo mentale finalizzato esclusivamente alla produzione di risposte corrette in ambito logico-matematico."
        ],
        c: 1
    },
    {
        q: "Cosa si intende per 'interdipendenza funzionale' all'interno di un gruppo classe?",
        a: [
            "La dipendenza assoluta di ogni studente dalle decisioni prese dal docente durante lo svolgimento delle attività.",
            "L'azione organizzata dei membri del gruppo che collaborano per il raggiungimento di un obiettivo comune condiviso.",
            "La suddivisione dei compiti in modo che ogni studente possa lavorare ignorando il contributo dei propri compagni.",
            "Un sistema di valutazione in cui il voto finale di ogni studente è indipendente dalla performance collettiva del gruppo."
        ],
        c: 1
    },
    {
        q: "Il 'Circle Time' è una metodologia didattica volta a:",
        a: [
            "Monitorare il tempo di attenzione dei singoli alunni durante le spiegazioni frontali di concetti astratti.",
            "Facilitare la comunicazione e la conoscenza reciproca attraverso un momento strutturato di vita scolastica.",
            "Garantire l'ordine alfabetico durante gli spostamenti degli studenti tra l'aula e i laboratori didattici.",
            "Isolare gli alunni con comportamenti problematici per permettere al resto della classe di lavorare in silenzio."
        ],
        c: 1
    },
    {
        q: "Le tecnologie 'inclusive', rispetto alle tecnologie assistive tradizionali:",
        a: [
            "Sono progettate esclusivamente per aumentare le capacità funzionali delle persone con disabilità certificate.",
            "Possono essere utili per tutti gli studenti, non solo per quelli con disabilità, favorendo la personalizzazione.",
            "Richiedono l'uso obbligatorio di hardware costosi e programmi non accessibili tramite i comuni dispositivi mobili.",
            "Sostituiscono completamente il ruolo del docente nell'interazione sociale all'interno dell'ambiente di apprendimento."
        ],
        c: 1
    },
    {
        q: "La 'profezia che si autoavvera' (Effetto Pigmalione) suggerisce che:",
        a: [
            "I risultati degli studenti non sono influenzati dalle aspettative o dai pregiudizi espressi dai loro insegnanti.",
            "Le aspettative positive o negative del docente possono influenzare concretamente le prestazioni degli alunni.",
            "Il successo formativo dipende esclusivamente dalle condizioni socio-economiche di partenza della famiglia.",
            "La valutazione deve essere sempre oggettiva e priva di qualsiasi coinvolgimento emotivo tra docente e allievo."
        ],
        c: 1
    },
    {
        q: "Nella didattica dell'errore, lo sbaglio viene considerato:",
        a: [
            "Un fallimento del processo educativo che deve essere sanzionato tempestivamente per evitare ripetizioni.",
            "Una risorsa e un'opportunità di apprendimento che favorisce lo sviluppo della capacità di autocorrezione.",
            "Un evento casuale che non fornisce alcuna indicazione utile sui processi cognitivi messi in atto dall'alunno.",
            "Un segnale di pigrizia che richiede l'assegnazione di compiti supplementari per consolidare le conoscenze."
        ],
        c: 1
    }
    // Aggiungi qui altre domande dai PDF seguendo questo stile bilanciato
];

// Funzione di shuffle per l'intero database
function getDailyQuestions() {
    let pool = [...masterPool].sort(() => 0.5 - Math.random()).slice(0, 30);
    return pool.map(item => {
        // Shuffle delle opzioni internamente per non avere la risposta giusta sempre nella stessa posizione
        let originalCorrect = item.a[item.c];
        let shuffledA = [...item.a].sort(() => 0.5 - Math.random());
        return {
            q: item.q,
            a: shuffledA,
            c: shuffledA.indexOf(originalCorrect)
        };
    });
}

let activeQuiz = getDailyQuestions();
let currentIdx = 0;
let correctHits = 0;
let wrongHits = 0;
let answersLog = [];

function render() {
    const data = activeQuiz[currentIdx];
    document.getElementById('pos').innerText = (currentIdx + 1) + " / 30";
    document.getElementById('bar-fill').style.width = (currentIdx / 30 * 100) + "%";
    document.getElementById('q-txt').innerText = data.q;
    
    const list = document.getElementById('opt-list');
    list.innerHTML = '';
    data.a.forEach((txt, i) => {
        const d = document.createElement('div');
        d.className = 'opt';
        d.innerHTML = `<span class="letter">${String.fromCharCode(65+i)}</span><span>${txt}</span>`;
        d.onclick = () => {
            document.querySelectorAll('.opt').forEach(x => x.classList.remove('active'));
            d.classList.add('active');
            answersLog[currentIdx] = i;
            document.getElementById('next-btn').disabled = false;
        };
        list.appendChild(d);
    });
}

document.getElementById('next-btn').onclick = () => {
    if(answersLog[currentIdx] === activeQuiz[currentIdx].c) correctHits++; else wrongHits++;
    document.getElementById('r-val').innerText = correctHits;
    document.getElementById('w-val').innerText = wrongHits;
    currentIdx++;
    if(currentIdx < 30) { render(); document.getElementById('next-btn').disabled = true; }
    else finish();
};

function finish() {
    document.getElementById('quiz-ui').classList.add('hidden');
    document.getElementById('res-ui').classList.remove('hidden');
    document.getElementById('bar-fill').style.width = "100%";
    document.getElementById('f-score').innerText = correctHits + " / 30";
    document.getElementById('f-msg').innerText = correctHits > 24 ? "Preparazione eccellente. Sei pronto per l'esame." : "Alcuni concetti richiedono un ulteriore approfondimento critico.";
}

document.getElementById('rev-btn').onclick = () => {
    const ui = document.getElementById('rev-ui');
    ui.classList.toggle('hidden');
    ui.innerHTML = '<h3>Dettaglio Risposte</h3>';
    activeQuiz.forEach((q, i) => {
        const ok = q.c === answersLog[i];
        const d = document.createElement('div');
        d.className = 'rev-item';
        d.innerHTML = `<strong>${i+1}. ${q.q}</strong><br>
        <div style="color:${ok ? 'var(--correct)':'var(--wrong)'}; margin-top:5px;">Scelta: ${q.a[answersLog[i]]}</div>
        ${!ok ? '<div style="color:var(--correct)">Corretta: ' + q.a[q.c] + '</div>' : ''}`;
        ui.appendChild(d);
    });
};

render();
</script>
</body>
</html>
